name: Update data

on:
  schedule:
    # Runs every 10 minutes on match days
    - cron: '*/10 12-23 * * SAT,SUN'
    - cron: '*/10 19-23 * * MON-FRI'
    # Also runs once late at night to catch up
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install beautifulsoup4 requests python-dateutil

      - name: Load Configuration Variables
        id: load_config
        run: |
          if [[ -f "./config.env" ]]; then
            source ./config.env
            echo "LEAGUE_SLUG=${LEAGUE_SLUG}" >> $GITHUB_ENV
            echo "TEAM_NAME=${TEAM_SLUG}" >> $GITHUB_ENV
            echo "LEAGUE_ID_NAME=${LEAGUE_NAME}" >> $GITHUB_ENV
            echo "SEASON=${CURRENT_SEASON}" >> $GITHUB_ENV
          else
            echo "❌ ERROR: config.env file not found."
            exit 1
          fi

      - name: Run Python Scraper
        id: python_scraper
        env:
          LEAGUE_SLUG: ${{ env.LEAGUE_SLUG }}
          TEAM_NAME: ${{ env.TEAM_NAME }}
          LEAGUE_ID_NAME: ${{ env.LEAGUE_ID_NAME }}
          SEASON: ${{ env.SEASON }}
        shell: python
        run: |
          import os
          import json
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          from dateutil.relativedelta import relativedelta

          TEAM_NAME = os.environ.get('TEAM_NAME', '').replace('-', ' ')
          LEAGUE_SLUG = os.environ.get('LEAGUE_SLUG')
          LEAGUE_ID_NAME = os.environ.get('LEAGUE_ID_NAME')
          SEASON = os.environ.get('SEASON')
          HEADERS = {'User-Agent': 'Mozilla/5.0'}

          def fetch_html(url):
              if not url: return None
              try:
                  response = requests.get(url, headers=HEADERS, timeout=30)
                  response.raise_for_status()
                  return response.text
              except Exception as e:
                  print(f"❌ Error fetching {url}: {e}")
                  return None

          def parse_standings(html_content):
              if not html_content: return []
              soup = BeautifulSoup(html_content, 'html.parser')
              table = soup.find('table', {'data-testid': 'football-table'})
              if not table: return []
              standings_data = []
              tbody = table.find('tbody')
              if not tbody: return []
              for row in tbody.find_all('tr'):
                  cells = row.find_all(['th', 'td'])
                  if len(cells) < 10: continue
                  try:
                      team_name_span = cells[0].find('span', class_='visually-hidden')
                      team_name = team_name_span.get_text(strip=True) if team_name_span else "Unknown"
                      standings_data.append({
                          'rank': int(cells[0].find('span', class_=lambda c: c and 'Rank' in c).get_text(strip=True)),
                          'team': {'name': team_name},
                          'points': int(cells[8].get_text(strip=True)),
                          'goalsDiff': int(cells[7].get_text(strip=True)),
                          'form': "".join([div.get_text(strip=True) for div in cells[9].find_all('div', {'data-testid': 'letter-content'})]),
                          'all': {
                              'played': int(cells[1].get_text(strip=True)), 'win': int(cells[2].get_text(strip=True)),
                              'draw': int(cells[3].get_text(strip=True)), 'lose': int(cells[4].get_text(strip=True)),
                              'goals': {'for': int(cells[5].get_text(strip=True)), 'against': int(cells[6].get_text(strip=True))}
                          },
                          'highlight': True if TEAM_NAME and TEAM_NAME in team_name.lower() else False, 'nextUp': 'TBD'
                      })
                  except: continue
              return standings_data

          def parse_fixtures(html_content):
              if not html_content: return []
              soup = BeautifulSoup(html_content, 'html.parser')
              fixtures = []
              try:
                  script_tag = soup.find('script', string=lambda t: t and 'window.__INITIAL_DATA__' in t)
                  if not script_tag: return []
                  json_text = script_tag.string.split('window.__INITIAL_DATA__=')[1].split(';')[0]
                  data = json.loads(json.loads(json_text))
                  fixtures_key = next((k for k in data.get('data', {}) if 'sport-data-scores-fixtures' in k), None)
                  if fixtures_key:
                      event_groups = data['data'][fixtures_key].get('data', {}).get('eventGroups', [])
                      for group in event_groups:
                          for secondary_group in group.get('secondaryGroups', []):
                              for event in secondary_group.get('events', []):
                                  fixtures.append({
                                      'home_team': event['home']['fullName'],
                                      'away_team': event['away']['fullName'],
                                      'datetime_utc': event['startDateTime']
                                  })
              except Exception as e:
                  print(f"⚠️ Error parsing fixtures: {e}")
              return fixtures

          def generate_ics(fixtures, output_path='public/cal/fixtures.ics'):
              os.makedirs(os.path.dirname(output_path), exist_ok=True)
              ics_lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//GitHub Actions//Football Fixtures//EN"]
              for fix in fixtures:
                  if TEAM_NAME.lower() in fix['home_team'].lower() or TEAM_NAME.lower() in fix['away_team'].lower():
                      dt = fix['datetime_utc'].replace('-', '').replace(':', '').split('.')[0] + 'Z'
                      ics_lines.extend(["BEGIN:VEVENT", f"UID:{hash(fix['datetime_utc'] + fix['home_team'])}@football.local", 
                                        f"DTSTAMP:{datetime.now().strftime('%Y%m%dT%H%M%SZ')}", f"DTSTART:{dt}", 
                                        f"SUMMARY:{fix['home_team']} v {fix['away_team']}", "END:VEVENT"])
              ics_lines.append("END:VCALENDAR")
              with open(output_path, 'w') as f: f.write("\n".join(ics_lines))

          def main():
              base_bbc_url = f"https://www.bbc.co.uk/sport/football/{LEAGUE_SLUG}"
              standings = parse_standings(fetch_html(f"{base_bbc_url}/table"))
              today = datetime.now()
              all_fixtures = []
              # Check 1 month back and 3 months forward
              for i in range(-1, 4):
                  month_str = (today + relativedelta(months=i)).strftime("%Y-%m")
                  all_fixtures.extend(parse_fixtures(fetch_html(f"{base_bbc_url}/scores-fixtures/{month_str}?filter=fixtures")))
              
              unique_fixtures = [dict(t) for t in {tuple(d.items()) for d in all_fixtures}]
              next_up_map = {}
              for fix in sorted(unique_fixtures, key=lambda x: x['datetime_utc']):
                  if fix['home_team'] not in next_up_map: next_up_map[fix['home_team']] = f"{fix['away_team']} (H)"
                  if fix['away_team'] not in next_up_map: next_up_map[fix['away_team']] = f"{fix['home_team']} (A)"
              for team in standings:
                  if team['team']['name'] in next_up_map: team['nextUp'] = next_up_map[team['team']['name']]
              
              os.makedirs('data', exist_ok=True)
              with open('data/standings.json', 'w') as f:
                  json.dump({'response': [{'league': {'name': LEAGUE_ID_NAME, 'season': SEASON, 'standings': [standings]}}]}, f, indent=4)
              with open('data/fixtures.json', 'w') as f: json.dump(unique_fixtures, f, indent=4)
              generate_ics(unique_fixtures)

          if __name__ == "__main__": main()

      - name: Commit and Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/fixtures.json public/cal/fixtures.ics epg.xml
          if git diff --staged --quiet; then
            echo "🟢 No data changes to commit."
          else
            git commit -m "📊 Automated standings, fixtures, and calendar update"
            git push
          fi
