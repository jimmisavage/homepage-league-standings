name: Update data

on:
  schedule:
    # Runs every 10 minutes on match days
    - cron: '*/10 12-23 * * SAT,SUN'
    - cron: '*/10 19-23 * * MON-FRI'
    # Also runs once late at night to catch up
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        # Playwright is gone! Back to basics.
        run: pip install beautifulsoup4 requests python-dateutil

      - name: Load Configuration Variables
        id: load_config
        run: |
          if [[ -f "./config.env" ]]; then
            source ./config.env
            echo "LEAGUE_SLUG=${LEAGUE_SLUG}" >> $GITHUB_ENV
            echo "TEAM_NAME=${TEAM_SLUG}" >> $GITHUB_ENV
            echo "LEAGUE_ID_NAME=${LEAGUE_NAME}" >> $GITHUB_ENV
            echo "SEASON=${CURRENT_SEASON}" >> $GITHUB_ENV
          else
            echo "❌ ERROR: config.env file not found."
            exit 1
          fi

      - name: Run CCFC Scraper
        id: python_scraper
        env:
          LEAGUE_SLUG: ${{ env.LEAGUE_SLUG }}
          TEAM_NAME: ${{ env.TEAM_NAME }}
          LEAGUE_ID_NAME: ${{ env.LEAGUE_ID_NAME }}
          SEASON: ${{ env.SEASON }}
        shell: python
        run: |
          import os
          import sys
          import json
          import re
          import requests
          from bs4 import BeautifulSoup

          # Force unbuffered output for GitHub Actions logs
          sys.stdout.reconfigure(line_buffering=True)

          TEAM_NAME = "Cardiff City"
          LEAGUE_ID_NAME = os.environ.get('LEAGUE_ID_NAME', 'Championship')
          SEASON = os.environ.get('SEASON', '2026/2027')
          HEADERS = {'User-Agent': 'Mozilla/5.0'}

          def fetch_html(url):
              try:
                  print(f"Fetching {url}...")
                  response = requests.get(url, headers=HEADERS, timeout=15)
                  response.raise_for_status()
                  return response.text
              except Exception as e:
                  print(f"❌ Error fetching {url}: {e}")
                  sys.exit(1)

          def parse_ccfc_table(html):
              soup = BeautifulSoup(html, 'html.parser')
              table = soup.find('table')
              if not table:
                  print("❌ Could not find a table element on the page.")
                  sys.exit(1)
                  
              standings = []
              for row in table.find_all('tr'):
                  cells = row.find_all(['th', 'td'])
                  # Extract all raw text from the row
                  texts = [c.get_text(strip=True) for c in cells if c.get_text(strip=True)]
                  if not texts: continue
                  
                  try:
                      # Heuristic filtering: grab digits and non-digits
                      nums = [t for t in texts if t.lstrip('+-').isdigit()]
                      if len(nums) < 7: continue 
                      
                      non_nums = [t for t in texts if not t.lstrip('+-').isdigit()]
                      if not non_nums: continue
                      
                      # Map the extracted data assuming standard EFL table layouts
                      team = non_nums[0]
                      rank = int(nums[0])
                      played = int(nums[1])
                      win = int(nums[2])
                      draw = int(nums[3])
                      lose = int(nums[4])
                      gd = int(nums[-2])
                      points = int(nums[-1])
                      
                      standings.append({
                          'rank': rank,
                          'team': {'name': team, 'logo': ''},
                          'points': points,
                          'goalsDiff': gd,
                          'form': '',
                          'all': {
                              'played': played, 'win': win, 'draw': draw, 'lose': lose,
                              'goals': {'for': 0, 'against': 0}
                          },
                          'highlight': True if 'cardiff' in team.lower() else False,
                          'nextUp': 'TBD'
                      })
                  except Exception as e:
                      continue
                      
              print(f"✅ Parsed {len(standings)} teams from the table.")
              return standings

          def parse_ccfc_matches(html, status):
              soup = BeautifulSoup(html, 'html.parser')
              matches = []
              
              # Find common match wrappers using regex on class names
              blocks = soup.find_all(['article', 'div'], class_=re.compile(r'(fixture|match|result)-list-item|event', re.I))
              
              # Fallback: scan lists if specific classes aren't found
              if not blocks:
                  blocks = soup.find_all('li')
                  
              for block in blocks:
                  text_raw = block.get_text(separator='|', strip=True)
                  if 'Cardiff' not in text_raw: continue
                  
                  # Exclude massive blocks (like a full page body accidentally caught in a div)
                  if len(text_raw) > 500: continue
                  
                  parts = [p.strip() for p in text_raw.split('|') if p.strip()]
                  
                  # Heuristic: Find teams (strings > 3 chars, not numbers, not standard football terms)
                  possible_teams = [p for p in parts if len(p) > 3 and not re.search(r'\d', p) and p.lower() not in ['home', 'away', 'vs', 'v', 'ft', 'ht', 'full time']]
                  
                  if len(possible_teams) >= 2:
                      home = possible_teams[0]
                      away = possible_teams[1]
                      
                      home_score = ""
                      away_score = ""
                      
                      # If it's a past result, try to extract the final score numbers
                      if status == "Finished":
                          nums = [p for p in parts if p.isdigit()]
                          if len(nums) >= 2:
                              home_score = nums[0]
                              away_score = nums[1]
                              
                      matches.append({
                          'home_team': home,
                          'away_team': away,
                          'date_text': parts[0], # Usually the date is the first element
                          'status': status,
                          'home_score': home_score,
                          'away_score': away_score
                      })
                      
              print(f"✅ Parsed {len(matches)} {status.lower()} matches.")
              return matches

          def main():
              # Direct endpoints for the data
              table_url = "https://www.cardiffcityfc.co.uk/table/594"
              fixtures_url = "https://www.cardiffcityfc.co.uk/fixture/list/594"
              results_url = "https://www.cardiffcityfc.co.uk/fixture/result/594"
              
              table_html = fetch_html(table_url)
              fixtures_html = fetch_html(fixtures_url)
              results_html = fetch_html(results_url)
              
              standings = parse_ccfc_table(table_html)
              
              all_matches = []
              # Order matters: results first, then future fixtures
              all_matches.extend(parse_ccfc_matches(results_html, "Finished"))
              all_matches.extend(parse_ccfc_matches(fixtures_html, "PreEvent"))
              
              next_up_map = {}
              for match in all_matches:
                  if match['status'] == 'PreEvent':
                      home = match['home_team']
                      away = match['away_team']
                      if home not in next_up_map:
                          next_up_map[home] = f"{away} (H)"
                      if away not in next_up_map:
                          next_up_map[away] = f"{home} (A)"

              for team in standings:
                  if team['team']['name'] in next_up_map:
                      team['nextUp'] = next_up_map[team['team']['name']]
              
              os.makedirs('data', exist_ok=True)
              with open('data/standings.json', 'w') as f:
                  json.dump({'response': [{'league': {'name': LEAGUE_ID_NAME, 'season': SEASON, 'standings': [standings]}}]}, f, indent=4)
              with open('data/fixtures.json', 'w') as f:
                  json.dump(all_matches, f, indent=4)
                  
              print("🚀 Scrape complete.")

          if __name__ == "__main__": main()

      - name: Commit and Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/fixtures.json epg.xml || true
          if git diff --staged --quiet; then
            echo "🟢 No data changes to commit."
          else
            git commit -m "📊 Automated standings, fixtures, and results update"
            git push
          fi
