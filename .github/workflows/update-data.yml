name: Update data

on:
  schedule:
    # Runs every 10 minutes on match days
    - cron: '*/10 12-23 * * SAT,SUN'
    - cron: '*/10 19-23 * * MON-FRI'
    # Also runs once late at night to catch up
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install beautifulsoup4 requests python-dateutil

      - name: Load Configuration Variables
        id: load_config
        run: |
          if [[ -f "./config.env" ]]; then
            source ./config.env
            echo "LEAGUE_SLUG=${LEAGUE_SLUG}" >> $GITHUB_ENV
            echo "TEAM_NAME=${TEAM_SLUG}" >> $GITHUB_ENV
            echo "LEAGUE_ID_NAME=${LEAGUE_NAME}" >> $GITHUB_ENV
            echo "SEASON=${CURRENT_SEASON}" >> $GITHUB_ENV
          else
            echo "❌ ERROR: config.env file not found."
            exit 1
          fi

      - name: Run Sky Sports Scraper
        id: python_scraper
        env:
          LEAGUE_SLUG: ${{ env.LEAGUE_SLUG }}
          TEAM_NAME: ${{ env.TEAM_NAME }}
          LEAGUE_ID_NAME: ${{ env.LEAGUE_ID_NAME }}
          SEASON: ${{ env.SEASON }}
        shell: python
        run: |
          import os
          import sys
          import json
          import requests
          import re
          from bs4 import BeautifulSoup

          # Force unbuffered output for GitHub Actions logs
          sys.stdout.reconfigure(line_buffering=True)

          TEAM_NAME = os.environ.get('TEAM_NAME', '').replace('-', ' ')
          # Sky uses lowercase slugs with hyphens
          LEAGUE_SLUG = os.environ.get('LEAGUE_SLUG', '').replace(' ', '-').lower()
          LEAGUE_ID_NAME = os.environ.get('LEAGUE_ID_NAME')
          SEASON = os.environ.get('SEASON')
          HEADERS = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'}

          def fetch_html(url):
              try:
                  print(f"Fetching {url}...")
                  response = requests.get(url, headers=HEADERS, timeout=10)
                  response.raise_for_status()
                  return response.text
              except Exception as e:
                  print(f"❌ Error fetching {url}: {e}")
                  sys.exit(1)

          def parse_sky_standings(html_content):
              soup = BeautifulSoup(html_content, 'html.parser')
              table = soup.find('table', class_='standing-table__table')
              if not table:
                  print("❌ Could not find the Sky Sports standings table.")
                  sys.exit(1)
                  
              standings_data = []
              tbody = table.find('tbody')
              
              for row in tbody.find_all('tr', class_='standing-table__row'):
                  cells = row.find_all('td')
                  if len(cells) < 10: continue
                  try:
                      # Sky Sports table columns:
                      # 0: Rank, 1: Team, 2: Pl, 3: W, 4: D, 5: L, 6: F, 7: A, 8: GD, 9: Pts
                      rank = int(cells[0].get_text(strip=True))
                      team_name_tag = cells[1].find('a')
                      team_name = team_name_tag.get_text(strip=True) if team_name_tag else cells[1].get_text(strip=True)
                      
                      played = int(cells[2].get_text(strip=True))
                      win = int(cells[3].get_text(strip=True))
                      draw = int(cells[4].get_text(strip=True))
                      lose = int(cells[5].get_text(strip=True))
                      goals_for = int(cells[6].get_text(strip=True))
                      goals_against = int(cells[7].get_text(strip=True))
                      gd = int(cells[8].get_text(strip=True))
                      points = int(cells[9].get_text(strip=True))

                      standings_data.append({
                          'rank': rank,
                          'team': {'name': team_name, 'logo': ''}, # Logos are handled by your separate action
                          'points': points,
                          'goalsDiff': gd,
                          'form': '', # Sky doesn't show form directly in this table
                          'all': {
                              'played': played, 'win': win, 'draw': draw, 'lose': lose,
                              'goals': {'for': goals_for, 'against': goals_against}
                          },
                          'highlight': True if TEAM_NAME and TEAM_NAME.lower() in team_name.lower() else False,
                          'nextUp': 'TBD'
                      })
                  except Exception as e:
                      print(f"⚠️ Error parsing row: {e}")
                      continue
                      
              print(f"✅ Parsed {len(standings_data)} teams from Sky Sports table.")
              return standings_data

          def parse_sky_matches(html_content, status):
              soup = BeautifulSoup(html_content, 'html.parser')
              matches = []
              current_date = "Unknown Date"
              
              # Sky groups matches by date headers (h3 or h4), followed by div.fixres__item
              for element in soup.find_all(['h3', 'h4', 'div'], class_=['fixres__header1', 'fixres__header2', 'fixres__item']):
                  if 'fixres__header' in ' '.join(element.get('class', [])):
                      current_date = element.get_text(strip=True)
                  elif 'fixres__item' in element.get('class', []):
                      try:
                          home_span = element.find('span', class_='matches__participant--side1')
                          away_span = element.find('span', class_='matches__participant--side2')
                          
                          # Extract team names
                          home_team = home_span.find('span', class_='swap-text__target').get_text(strip=True) if home_span.find('span', class_='swap-text__target') else home_span.get_text(strip=True)
                          away_team = away_span.find('span', class_='swap-text__target').get_text(strip=True) if away_span.find('span', class_='swap-text__target') else away_span.get_text(strip=True)
                          
                          # Clean up any weird invisible spacing
                          home_team = re.sub(r'\s+', ' ', home_team).strip()
                          away_team = re.sub(r'\s+', ' ', away_team).strip()

                          match_info = {
                              'home_team': home_team,
                              'away_team': away_team,
                              'date_text': current_date,
                              'status': status
                          }

                          # If it's a finished result, grab the final scores
                          if status == "Finished":
                              score_span = element.find('span', class_='matches__teamscores')
                              if score_span:
                                  scores = score_span.find_all('span', class_='matches__teamscores-side')
                                  if len(scores) >= 2:
                                      match_info['home_score'] = scores[0].get_text(strip=True)
                                      match_info['away_score'] = scores[1].get_text(strip=True)
                          
                          matches.append(match_info)
                      except Exception as e:
                          pass
                          
              print(f"✅ Parsed {len(matches)} {status.lower()} matches.")
              return matches

          def main():
              base_sky_url = "https://www.skysports.com"
              
              table_url = f"{base_sky_url}/{LEAGUE_SLUG}-table"
              fixtures_url = f"{base_sky_url}/{LEAGUE_SLUG}-fixtures"
              results_url = f"{base_sky_url}/{LEAGUE_SLUG}-results"
              
              standings_html = fetch_html(table_url)
              fixtures_html = fetch_html(fixtures_url)
              results_html = fetch_html(results_url)
              
              standings = parse_sky_standings(standings_html)
              
              all_matches = []
              # Order matters here: we parse past results first, then future fixtures
              all_matches.extend(parse_sky_matches(results_html, "Finished"))
              all_matches.extend(parse_sky_matches(fixtures_html, "PreEvent"))
              
              # Calculate the "nextUp" column for the standings
              # We just look for the first 'PreEvent' match involving that team
              next_up_map = {}
              for match in all_matches:
                  if match['status'] == 'PreEvent':
                      home = match['home_team']
                      away = match['away_team']
                      if home not in next_up_map:
                          next_up_map[home] = f"{away} (H)"
                      if away not in next_up_map:
                          next_up_map[away] = f"{home} (A)"

              for team in standings:
                  if team['team']['name'] in next_up_map:
                      team['nextUp'] = next_up_map[team['team']['name']]
              
              # Save it all out!
              os.makedirs('data', exist_ok=True)
              with open('data/standings.json', 'w') as f:
                  json.dump({'response': [{'league': {'name': LEAGUE_ID_NAME, 'season': SEASON, 'standings': [standings]}}]}, f, indent=4)
              with open('data/fixtures.json', 'w') as f:
                  json.dump(all_matches, f, indent=4)
                  
              print("🚀 Scrape complete.")

          if __name__ == "__main__": main()

      - name: Commit and Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/fixtures.json epg.xml || true
          if git diff --staged --quiet; then
            echo "🟢 No data changes to commit."
          else
            git commit -m "📊 Automated standings, fixtures, and results update"
            git push
          fi
